services:
  - type: web
    name: magnet-waitlist-api
    runtime: node
    plan: starter
    branch: main
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOW_ORIGINS
        value: https://gomagnet.ai,https://www.gomagnet.ai
      - key: ADMIN_TOKEN
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: magnet-waitlist-db
          property: connectionString

databases:
  - name: magnet-waitlist-db
    databaseName: magnet_waitlist
    user: magnet_waitlist
    plan: basic-256mb
    postgresMajorVersion: "16"
